<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hosam Hamdy's hideout</title>
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      .wrapper {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100dvh;
      }

      #hosam-avatar {
        width: 20svb;
        height: 20svb;
        object-fit: cover;
        object-position: 100% 0;
        border-radius: 50%;
        outline: 4px dashed teal;
        outline-offset: 4px;
        animation: smoothen-outline 2s infinite alternate-reverse;
      }

      @keyframes smoothen-outline {
        0% {
          outline: 4px dotted teal;
        }
        50% {
          outline: 4px dashed teal;
        }
        100% {
          outline: 4px solid teal;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <img
        id="hosam-avatar"
        src="./assets/hosam_profile.jpg"
        alt="Hosam Hamdy Vertical Half Profile"
        width="1080px"
        height="1080px" />
      <h1>Work in progress<span id="dots">...</span></h1>
      <p>
        This website is currently a work on progress. You can suddenly find changes
        popping everywhere.
      </p>
      <p>
        Find me on
        <!-- <a rel="me" href="https://uiuxdev.social/@Hosam" target="_blank">Mastodon</a>, or -->
        <a href="https://twitter.com/intent/user?user_id=96835066" target="_blank"
          >Twitter</a
        >
      </p>
    </div>
    <script defer>
      const dotsSpan = document.getElementById('dots');

      setInterval(() => {
        dotsSpan.textContent =
          dotsSpan.textContent.length === 3 ? '' : dotsSpan.textContent + '.';
      }, 1000);
    </script>
  </body>
</html>
