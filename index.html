<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Hosam Hamdy's hideout</title>
  </head>

  <body>
    <div class="wrapper">
      <img
        id="hosam-avatar"
        src="./assets/hosam_profile.jpg"
        alt="Hosam Hamdy Vertical Half Profile"
        width="1080px"
        height="1080px" />
      <h1>Work in progress<span id="dots">...</span></h1>

        This website is currently a work on progress. You can suddenly find changes
        popping everywhere.
      </p>
      <p>
        Find me on
        <!-- <a rel="me" href="https://uiuxdev.social/@Hosam" target="_blank">Mastodon</a>, or -->

          >Twitter</a
        >

    </div>
    <script defer>
      const dotsSpan = document.getElementById('dots');

      setInterval(() => {
        dotsSpan.textContent =
          dotsSpan.textContent.length === 3 ? '' : dotsSpan.textContent + '.';
      }, 1000);
    </script>
  </body>
