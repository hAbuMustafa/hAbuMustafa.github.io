<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="https://fav.farm/🔤" />
    <link rel="stylesheet" href="style.css" />
    <script async src="scripts.js"></script>
    <title>I18n Assistant</title>
  </head>
  <body>
    <main>
      <h1><abbr title="Internationalization">I18n</abbr> Assistant</h1>

      <input
        id="term"
        type="text"
        pattern="[A-Za-z\d\w ]*"
        title="أحرف إنجليزية وأرقام ورموز فقط"
        placeholder="اكتب المصطلح الإنجليزي..."
        aria-label="المصطلح" />

      <p id="results"></p>
    </main>

    <footer dir="ltr">
      This project is open source at
      <a href="https://github.com/hAbuMustafa/i18n-finder">Github</a>.<br />
      This project leverages the use of the i18n dictionary by
      <a
        href="https://github.com/softvenue/i18n"
        target="_blank"
        rel="noopener noreferrer"
        >softvenue</a
      >.
    </footer>
  </body>
</html>
